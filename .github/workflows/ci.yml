name: CI
'on':
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

jobs:
  build-dita:
    name: Build DITA
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Git checkout specialization
        uses: actions/checkout@v6
        with:
          repository: dita-bootstrap/dita-bootstrap.specialization
          ref: develop
          path: specialization

      - name: Copy Sample folder
        run: cp -R specialization/sample sample

      - name: Build Cerulean Theme
        uses: dita-ot/dita-ot-action@4.4
        with:
          install: |
            apt-get update -q
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -qy --no-install-recommends nodejs libfontconfig1
            nodejs -v
          plugins: |
            fox.jason.extend.css
            https://github.com/dita-bootstrap/dita-bootstrap.specialization/archive/develop.zip
            https://github.com/infotexture/dita-bootstrap/archive/develop.zip
            https://github.com/jason-fox/fox.jason.prismjs/archive/master.zip
            https://github.com/dita-bootstrap/dita-bootstrap.pdf/archive/develop.zip
          project: .github/dita-ot/cerulean.xml

      - name: Build Darkly Theme
        uses: dita-ot/dita-ot-action@4.4
        with:
          install: |
            apt-get update -q
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -qy --no-install-recommends nodejs libfontconfig1
            nodejs -v
          plugins: |
            fox.jason.extend.css
            https://github.com/dita-bootstrap/dita-bootstrap.specialization/archive/develop.zip
            https://github.com/infotexture/dita-bootstrap/archive/develop.zip
            https://github.com/jason-fox/fox.jason.prismjs/archive/master.zip
            https://github.com/dita-bootstrap/dita-bootstrap.pdf/archive/develop.zip
          project: .github/dita-ot/darkly.xml

      - name: Build Flatly Theme
        uses: dita-ot/dita-ot-action@4.4
        with:
          install: |
            apt-get update -q
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -qy --no-install-recommends nodejs libfontconfig1
            nodejs -v
          plugins: |
            fox.jason.extend.css
            https://github.com/dita-bootstrap/dita-bootstrap.specialization/archive/develop.zip
            https://github.com/infotexture/dita-bootstrap/archive/develop.zip
            https://github.com/jason-fox/fox.jason.prismjs/archive/master.zip
            https://github.com/dita-bootstrap/dita-bootstrap.pdf/archive/develop.zip
          project: .github/dita-ot/flatly.xml

      - name: Build Cosmo Theme
        uses: dita-ot/dita-ot-action@4.4
        with:
          install: |
            apt-get update -q
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -qy --no-install-recommends nodejs libfontconfig1
            nodejs -v
          plugins: |
            fox.jason.extend.css
            https://github.com/dita-bootstrap/dita-bootstrap.specialization/archive/develop.zip
            https://github.com/infotexture/dita-bootstrap/archive/develop.zip
            https://github.com/jason-fox/fox.jason.prismjs/archive/master.zip
            https://github.com/dita-bootstrap/dita-bootstrap.pdf/archive/develop.zip
          project: .github/dita-ot/cosmo.xml

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pdf
          path: out/pdf
